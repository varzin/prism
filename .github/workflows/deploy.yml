name: Deploy to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds with Vite's configured base (/prism/) into ./dist
      - name: Build
        run: pnpm build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths.
      # Serving a copy of index.html lets BrowserRouter handle deep links
      # (e.g. /prism/local/:paletteId) on refresh or direct navigation.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
